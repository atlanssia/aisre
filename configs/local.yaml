# AI RCA Workbench - Local Development Configuration

server:
  host: "0.0.0.0"
  port: 8080

database:
  driver: "sqlite"
  dsn: "./data/aisre.db"

redis:
  enabled: false
  # addr: "localhost:6379"

llm:
  default_provider: "openai-compatible"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  models:
    summarize:
      model: "gpt-4o-mini"
      max_tokens: 1024
    rca:
      model: "gpt-4o"
      max_tokens: 4096
    embedding:
      model: "text-embedding-3-small"

adapters:
  openobserve:
    enabled: true
    base_url: "http://localhost:5080"
    org_id: "default"
    token: "${OO_TOKEN}"
    username: "root@example.com"
    password: "Complexpass#123"

log:
  level: "debug"
  format: "json"

embedding:
  base_url: ""
  api_key: ""
  model: "text-embedding-3-small"
  dimensions: 1536

features:
  similar_incident:
    enabled: false
