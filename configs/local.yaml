# AI RCA Workbench - Local Development Configuration

server:
  host: "0.0.0.0"
  port: 8080

database:
  driver: "sqlite"
  dsn: "./data/aisre.db"

redis:
  enabled: false
  # addr: "localhost:6379"

llm:
  default_provider: "anthropic"
  models:
    summarize:
      provider: "anthropic"
      model: "claude-haiku-4-5-20251001"
      max_tokens: 1024
    rca:
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      max_tokens: 4096
    embedding:
      provider: "openai"
      model: "text-embedding-3-small"

adapters:
  openobserve:
    enabled: false
    # base_url: "http://localhost:5080"
    # auth:
    #   username: ""
    #   password: ""

log:
  level: "debug"
  format: "json"
