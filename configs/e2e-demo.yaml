server:
  host: "0.0.0.0"
  port: 8080

database:
  driver: "sqlite"
  dsn: "./data/aisre-demo.db"

llm:
  default_provider: "openai-compatible"
  base_url: "http://localhost:9999"
  api_key: "mock-key"
  models:
    rca:
      model: "gpt-4"
      max_tokens: 4096

adapters:
  openobserve:
    enabled: false
    base_url: "http://localhost:5080"
    org_id: "default"

log:
  level: "debug"
  format: "text"

embedding:
  base_url: "http://localhost:9999"
  api_key: "mock-key"
  model: "text-embedding-mock"
  dimensions: 3

features:
  similar_incident:
    enabled: true
