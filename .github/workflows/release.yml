name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run all tests
        run: go test -race -count=1 ./...

  build:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.3.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/aisre-linux-amd64 ./cmd/server
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bin/aisre-darwin-arm64 ./cmd/server
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/aisre-darwin-amd64 ./cmd/server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          generate_release_notes: true
          files: |
            bin/aisre-linux-amd64
            bin/aisre-darwin-arm64
            bin/aisre-darwin-amd64
